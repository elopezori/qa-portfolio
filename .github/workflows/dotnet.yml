name: .NET CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore

    - name: Install Playwright CLI tools
      run: dotnet tool install --global Microsoft.Playwright.CLI

    - name: Install Playwright Browsers
      run: playwright install

    - name: Start API
      run: dotnet run --project UserManagementApp.Test/UserManagementApp.Tests.csproj --urls http://localhost:5167 &

    - name: Wait for API
      run: sleep 10

    - name: Run tests
      run: dotnet test --no-build